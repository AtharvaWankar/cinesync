<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>CineSync — {{ movie_name }}</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="watch-body">

<!-- Name prompt overlay -->
<div id="name-overlay" class="overlay">
  <div class="overlay-box">
    <div class="logo">🎬 CineSync</div>
    <h2>Welcome to the Watch Party</h2>
    <p>Enter your name so the host knows you've joined.</p>
    <input type="text" id="viewer-name-input" placeholder="Your name" maxlength="30"
           onkeydown="if(event.key==='Enter') joinParty()"/>
    <button class="btn btn-primary" onclick="joinParty()">Join Party</button>
  </div>
</div>

<!-- Main watch layout -->
<div class="watch-container" id="watch-container" style="display:none">

  <!-- Video -->
  <div class="video-wrap">
    <video id="viewer-video" src="/video" preload="metadata">
      {% if has_subtitles %}
      <track kind="subtitles" src="/subtitles" srclang="en" label="Subtitles" default/>
      {% endif %}
      Your browser does not support HTML5 video.
    </video>

    <!-- Viewer controls bar -->
    <div class="viewer-controls">
      <button class="ctrl-btn ctrl-btn--toggle" id="v-btn-toggle" onclick="viewerToggle()">▶</button>
      <span id="v-current-time" class="time-display">0:00</span>
      <input type="range" id="v-timeline" min="0" max="100" value="0" step="10"
             oninput="onViewerTimelineDrag(this.value)"
             onchange="onViewerTimelineSeek(this.value)"/>
      <span id="v-total-time" class="time-display">0:00</span>
      <div class="vol-wrap">
        <span class="vol-icon" onclick="toggleMute()">🔊</span>
        <div class="vol-slider-wrap">
          <input type="range" id="v-volume" min="0" max="100" value="100" step="1"
                 oninput="onVolumeChange(this.value)"/>
        </div>
        <div id="vol-toast" class="vol-toast"></div>
      </div>
    </div>

    <div id="sync-overlay" class="sync-overlay" style="display:none">
      <div class="spinner"></div>
      <span>Syncing...</span>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <!-- Collapse toggle button -->
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle chat">
      <span id="toggle-icon">»</span>
    </button>

    <div class="sidebar-inner" id="sidebar-inner">
      <div class="sidebar-header">
        <span class="logo-small">🎬 CineSync</span>
        <span id="viewer-count-badge">0 watching</span>
      </div>

      <div class="movie-title" id="movie-title">{{ movie_name }}</div>

      <!-- Viewer list -->
      <div class="viewer-section">
        <div class="section-label">In this party</div>
        <div id="viewer-list" class="viewer-list-side"></div>
      </div>

      <!-- Chat -->
      <div class="chat-section">
        <div class="section-label">Chat</div>
        <div id="chat-messages" class="chat-messages"></div>
        <div id="typing-indicator" class="typing-indicator"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="React..." maxlength="300"
                 onkeydown="if(event.key==='Enter') sendChat()"
                 oninput="onChatInput()"/>
          <button class="btn btn-secondary btn-sm" onclick="sendChat()">→</button>
        </div>
      </div>
    </div>

  </aside>

  <!-- Seek toast -->
  <div id="seek-toast" class="seek-toast"></div>
    <!-- Out of sync indicator -->
  <div id="sync-indicator" class="sync-indicator"></div>
</div><!-- end watch-container -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script>
  function toggleSidebar() {
    const container = document.getElementById("watch-container");
    const icon      = document.getElementById("toggle-icon");
    const isCollapsed = container.classList.toggle("sidebar-collapsed");
    icon.textContent = isCollapsed ? "«" : "»";

  }

  const socket = io({
    reconnection: true,
    reconnectionAttempts: 10,
    reconnectionDelay: 1500,
    transports: ["polling", "websocket"],
  });
  socket.on("connect", () => console.log("[Socket] Connected:", socket.id));
  socket.on("disconnect", (r) => console.warn("[Socket] Disconnected:", r));
  socket.on("connect_error", (e) => console.error("[Socket] Error:", e.message));
</script>
<script src="/static/js/viewer.js"></script>
</body>
</html>
